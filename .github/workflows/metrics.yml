name: GitHub Metrics

on:
  schedule:
    - cron: "0 18 * * *" # 日本時間午前3時（UTC 18:00）に毎日自動実行
  workflow_dispatch: # 手動実行可能にする
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: output/metrics.svg
          # デフォルトのトークン（パブリックリポジトリのみ集計）
          # プライベートリポジトリを含めたい場合は、PERSONAL_ACCESS_TOKEN に差し替えてください。
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # 基本設定（ヘッダー、アクティビティ、コミュニティ、リポジトリ数、メタデータ）
          base: header, activity, community, repositories, metadata
          
          # 言語統計プラグイン
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # 獲得実績プラグイン（コンパクト表示）
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
